name: 自动合并规则

on:
  push:
    branches: [main]
    paths:
      - "scripts/merge.js"
      - "package.json"
  schedule:
    # 每天 UTC 0:00 (北京时间 8:00) 运行
    - cron: "0 0 * * *"
  workflow_dispatch:
    # 支持手动触发

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run merge
        run: npm run merge

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet merged-convert.js 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged-convert.js
          git commit -m "chore: 自动更新合并规则 [skip ci]"
          git push
